target_table:
  name: QCRF704CheckLnCat
  schema: DWH # указать схему из контекста?
  description: "Таблица хранения результата контроля QCRF704CheckLnCat по данным сущности RF704TotalReg"
  attributes:
    
    - name: RecID
      domain_type: number
      description: "Идентификатор записи итогового реестра RF704TotalReg"
      constraints: [PRIMARY_KEY]
      visible: false # по дефолту true 
      distribution_key: 1

    - name: BranchID
      domain_type: number
      description: "Филиал"
      visible: false

    - name: DepartmentID
      domain_type: number
      description: "Подразделение для выгрузки результата контроля"
      visible: false

    - name: Description
      domain_type: string
      description: "Описание нарушения контроля"
      visible: false

    - name: RepCode
      domain_type: string
      description: "Код отчетной формы"
      visible: false
      
    - name: IsError
      domain_type: number
      description: "Признак наличия нарушения контроля"
      visible: false


    # экспортируемые атрибуты:
