name: dqcr-studio

services:
  backend:
    image: dqcr-studio-backend:prod
    platform: ${DQCR_TARGET_PLATFORM:-linux/amd64}
    container_name: dqcr-studio-backend
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        FW_INSTALL_MODE: ${FW_INSTALL_MODE:-local}
        FW_PACKAGE_SPEC: ${FW_PACKAGE_SPEC:-}
    env_file:
      - ../../backend/.env
    environment:
      PROJECTS_PATH: /app/projects
      CATALOG_PATH: /app/catalog
    volumes:
      - ../../projects:/app/projects
      - ../../catalog:/app/catalog
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    image: dqcr-studio-frontend:prod
    platform: ${DQCR_TARGET_PLATFORM:-linux/amd64}
    container_name: dqcr-studio-frontend
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend.prod
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DQCR_PORT:-80}:80"
