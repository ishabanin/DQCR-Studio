server {
  listen 80;
  client_max_body_size 50m;

  location /api/ {
    proxy_pass http://dqcr-studio-backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    proxy_pass http://dqcr-studio-backend:8000/health;
  }

  location /ready {
    proxy_pass http://dqcr-studio-backend:8000/ready;
  }

  location / {
    proxy_pass http://dqcr-studio-frontend:5173/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
