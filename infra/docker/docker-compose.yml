name: dqcr-studio

services:
  backend:
    image: dqcr-studio-backend
    container_name: dqcr-studio-backend
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        FW_INSTALL_MODE: ${FW_INSTALL_MODE:-local}
        FW_PACKAGE_SPEC: ${FW_PACKAGE_SPEC:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ../../backend:/app
      - ../../projects:/app/projects
      - ../../catalog:/app/catalog
    environment:
      SECRET_KEY: dev-secret-key
      LOG_LEVEL: info
      PROJECTS_PATH: /app/projects
      CATALOG_PATH: /app/catalog
      FW_USE_CLI: ${FW_USE_CLI:-true}
      FW_CLI_COMMAND: ${FW_CLI_COMMAND:-fw2}
    ports:
      - "8000:8000"

  frontend:
    image: dqcr-studio-frontend
    container_name: dqcr-studio-frontend
    build:
      context: ../../frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: dqcr-studio-nginx
    container_name: dqcr-studio-nginx
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
