services:
  backend:
    build:
      context: ../../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ../../backend:/app
      - ../../projects:/app/projects
    environment:
      SECRET_KEY: dev-secret-key
      LOG_LEVEL: info
      PROJECTS_PATH: /app/projects
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../../frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
